spec_version: 1
name: invoice_reconciliation_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

metadata:
  domain: finance_ops
  benchmark: invoice_reconciliation
  action_schema:
    po_id: string
    decision:
      type: enum
      values: [pay, hold, flag]
    note: string

tasks:
  - id: easy-exact-match
    difficulty: easy
    max_steps: 2
  - id: medium-fuzzy-tolerance
    difficulty: medium
    max_steps: 2
  - id: hard-discrepancy-detection
    difficulty: hard
    max_steps: 2
